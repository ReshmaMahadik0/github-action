on:
  push:
    branches: [ "main" ]


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

        run: chmod +x mvnw
      - name: Run CI/CD Script
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./scm/txt.sh